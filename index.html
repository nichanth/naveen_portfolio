<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naveen Prasath · Senior Game QA Engineer</title>
  <meta name="description" content="The playable résumé of Naveen Prasath Manoharan — Senior Game QA Engineer. 9 years, 5,000+ bugs, Moonfrog Labs & Pole To Win." />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // set theme + palette + font before paint to avoid flash
    (function () {
      try {
        var t = localStorage.getItem('np-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var p = localStorage.getItem('np-palette') || 'arcade';
        document.documentElement.setAttribute('data-palette', p);
        var fonts = { exo:"'Exo 2', sans-serif", chakra:"'Chakra Petch', sans-serif", rajdhani:"'Rajdhani', sans-serif", audiowide:"'Audiowide', cursive", orbitron:"'Orbitron', sans-serif" };
        var f = localStorage.getItem('np-font') || 'exo';
        if (fonts[f]) document.documentElement.style.setProperty('--font-display', fonts[f]);
      } catch (e) {}
    })();
  </script>
</head>
